spec_version: 1
name: crisis_negotiator
type: space
runtime: fastapi
app: server.app:app
port: 8000
version: "1.0.0"
description: >
  Multi-agent hostage de-escalation arena. A negotiator agent must model
  the hidden emotional state of an adversarial hostage-taker, manage
  tactical commander pressure, and use FBI BCSM techniques to achieve
  peaceful resolution. Trains theory-of-mind, deception detection, and
  long-horizon persuasion under time pressure.
author: Dinesh052
tags:
  - openenv
  - multi-agent
  - crisis-negotiation
  - self-improvement
  - reinforcement-learning
  - mercor-token-efficiency
  - snorkel-expert-in-the-loop
  - fleet-ai-oversight

# Training artifacts
training_script: train_colab.py
training_notebook: train_colab.ipynb
reward_function: reward_fn.py
grader: grader.py
blog_url: "https://huggingface.co/blog/Dinesh052/crisis-negotiator-openenv"
demo_url: "/ui"

# Themes addressed
themes:
  - "Theme 1: Multi-Agent Interactions"
  - "Theme 4: Self-Improvement"
sub_themes:
  - "Fleet AI: Scalable Oversight (supervisor agent)"
  - "Halluminate: Multi-Actor Environments (4 agents + 2 liaisons)"
  - "Mercor: Token-scaled rewards (quality/log(tokens))"
  - "Snorkel AI: Simulated Experts-in-the-Loop (rotating expert feedback)"

tasks:
  - easy_domestic_desperate
  - easy_bank_surrender
  - easy_workplace_grievance
  - medium_custody_ideologue
  - medium_pharmacy_calculated
  - medium_bridge_unstable
  - medium_protest_drift
  - hard_embassy_calculated
  - hard_hospital_bluffer
  - hard_school_unstable_drift
  - hard_compound_ideologue
difficulty_levels:
  - easy
  - medium
  - hard
procedural_generation: true
max_combinations: 540
