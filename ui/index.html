<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚨 Crisis Negotiator — Live Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0f; color: #e0e0e0; height: 100vh; overflow: hidden; }

.container { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto 1fr auto; height: 100vh; gap: 2px; background: #1a1a2e; }

/* Header */
.header { grid-column: 1 / -1; background: #16213e; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 16px; color: #e94560; }
.header .status { font-size: 12px; color: #4ecca3; }

/* Chat panel */
.chat-panel { background: #0f0f1a; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 13px; line-height: 1.4; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.ht { background: #2d1b1b; border-left: 3px solid #e94560; align-self: flex-start; }
.msg.negotiator { background: #1b2d1b; border-left: 3px solid #4ecca3; align-self: flex-end; }
.msg.commander { background: #1b1b2d; border-left: 3px solid #f0a500; align-self: center; font-style: italic; font-size: 11px; }
.msg.hostage { background: #2d2d1b; border-left: 3px solid #9b59b6; align-self: center; font-size: 11px; }
.msg .speaker { font-weight: bold; font-size: 11px; margin-bottom: 3px; }
.msg .cues { font-size: 10px; color: #888; margin-top: 3px; }

/* Right panel */
.right-panel { background: #0f0f1a; padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; border-left: 1px solid #1a1a2e; }

/* Gauges */
.gauge { background: #16213e; border-radius: 8px; padding: 10px; }
.gauge-label { font-size: 11px; color: #888; margin-bottom: 4px; display: flex; justify-content: space-between; }
.gauge-bar { height: 20px; border-radius: 4px; background: #1a1a2e; overflow: hidden; position: relative; }
.gauge-fill { height: 100%; transition: width 0.5s ease, background 0.5s ease; border-radius: 4px; }
.gauge-fill.agitation { background: linear-gradient(90deg, #4ecca3, #f0a500, #e94560); }
.gauge-fill.trust { background: linear-gradient(90deg, #e94560, #f0a500, #4ecca3); }
.gauge-value { position: absolute; right: 6px; top: 2px; font-size: 11px; font-weight: bold; }

/* Demands */
.demands { background: #16213e; border-radius: 8px; padding: 10px; }
.demands h3 { font-size: 11px; color: #888; margin-bottom: 6px; }
.demand-item { font-size: 11px; padding: 4px 0; border-bottom: 1px solid #1a1a2e; }
.demand-item.ack { color: #4ecca3; }
.demand-item .badge { font-size: 9px; background: #e94560; color: white; padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
.demand-item .badge.drift { background: #9b59b6; }

/* Hidden state (toggle) */
.hidden-state { background: #1a0a0a; border: 1px solid #e94560; border-radius: 8px; padding: 10px; font-size: 11px; }
.hidden-state h3 { color: #e94560; font-size: 11px; margin-bottom: 6px; }
.hidden-state .row { display: flex; justify-content: space-between; padding: 2px 0; }

/* Supervisor */
.flags { background: #16213e; border-radius: 8px; padding: 10px; }
.flags h3 { font-size: 11px; color: #888; margin-bottom: 4px; }
.flag { font-size: 10px; padding: 3px 6px; margin: 2px 0; border-radius: 4px; }
.flag.critical { background: #2d1b1b; color: #e94560; }
.flag.warning { background: #2d2d1b; color: #f0a500; }

/* Bottom bar - training curve */
.bottom-bar { grid-column: 1 / -1; background: #16213e; padding: 8px 20px; border-top: 1px solid #0f3460; display: flex; align-items: center; gap: 20px; height: 120px; }
.chart-container { flex: 1; height: 100%; }
.stats { font-size: 11px; min-width: 150px; }
.stats .stat { margin: 3px 0; }
.stats .stat-value { color: #4ecca3; font-weight: bold; }

/* Controls */
.controls { display: flex; gap: 6px; align-items: center; }
.btn { padding: 6px 12px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit; }
.btn-primary { background: #4ecca3; color: #0a0a0f; }
.btn-danger { background: #e94560; color: white; }
.btn-secondary { background: #16213e; color: #e0e0e0; border: 1px solid #333; }
.btn:hover { opacity: 0.8; }
select { background: #16213e; color: #e0e0e0; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-family: inherit; }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🚨 Crisis Negotiator — Live Demo</h1>
    <div class="controls">
      <select id="scenario">
        <option value="easy_domestic_desperate">Easy: Domestic Desperate</option>
        <option value="easy_bank_surrender">Easy: Bank Surrender</option>
        <option value="easy_workplace_grievance">Easy: Workplace Grievance</option>
        <option value="medium_custody_ideologue">Medium: Custody Ideologue</option>
        <option value="medium_pharmacy_calculated">Medium: Pharmacy Calculated</option>
        <option value="medium_bridge_unstable">Medium: Bridge Unstable</option>
        <option value="medium_protest_drift">Medium: Protest (Demand Drift)</option>
        <option value="hard_embassy_calculated">Hard: Embassy Calculated</option>
        <option value="hard_hospital_bluffer">Hard: Hospital Bluffer</option>
        <option value="hard_school_unstable_drift">Hard: School Unstable+Drift</option>
        <option value="hard_compound_ideologue">Hard: Compound Ideologue</option>
      </select>
      <button class="btn btn-primary" onclick="startEpisode()">▶ Start</button>
      <button class="btn btn-secondary" onclick="nextStep()">Next step →</button>
      <button class="btn btn-danger" onclick="resetDemo()">Reset</button>
      <label style="font-size:11px;"><input type="checkbox" id="showHidden" onchange="toggleHidden()"> Show Hidden State</label>
    </div>
    <div class="status" id="statusText">Ready</div>
  </div>

  <!-- Chat -->
  <div class="chat-panel" id="chat"></div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="gauge">
      <div class="gauge-label"><span>Agitation</span><span id="agVal">0.0</span></div>
      <div class="gauge-bar"><div class="gauge-fill agitation" id="agBar" style="width:0%"></div></div>
    </div>
    <div class="gauge">
      <div class="gauge-label"><span>Trust</span><span id="trVal">0</span></div>
      <div class="gauge-bar"><div class="gauge-fill trust" id="trBar" style="width:0%"></div></div>
    </div>
    <div class="gauge">
      <div class="gauge-label"><span>Time Remaining</span><span id="timeVal">-</span></div>
      <div class="gauge-bar"><div class="gauge-fill" id="timeBar" style="width:100%;background:#4ecca3"></div></div>
    </div>
    <div class="demands" id="demandsPanel"><h3>DEMANDS</h3></div>
    <div class="flags" id="flagsPanel"><h3>SUPERVISOR</h3></div>
    <div class="hidden-state" id="hiddenPanel" style="display:none">
      <h3>🔒 HIDDEN STATE (judges only)</h3>
      <div class="row"><span>Agitation:</span><span id="hAg">-</span></div>
      <div class="row"><span>Trust:</span><span id="hTr">-</span></div>
      <div class="row"><span>Breaking Point:</span><span id="hBp">-</span></div>
      <div class="row"><span>Personality:</span><span id="hPers">-</span></div>
      <div class="row"><span>Actual Hostages:</span><span id="hHost">-</span></div>
      <div class="row"><span>Has Weapon:</span><span id="hWeap">-</span></div>
      <div class="row"><span>Calm Streak:</span><span id="hCalm">-</span></div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="chart-container"><canvas id="rewardChart"></canvas></div>
    <div class="stats">
      <div class="stat">Episodes: <span class="stat-value" id="epCount">0</span></div>
      <div class="stat">Success Rate: <span class="stat-value" id="successRate">0%</span></div>
      <div class="stat">Avg Reward: <span class="stat-value" id="avgReward">0.00</span></div>
      <div class="stat">Last Outcome: <span class="stat-value" id="lastOutcome">-</span></div>
    </div>
  </div>
</div>

<script>
// ── State ──
let episode = null;
let episodeHistory = [];
let rewardHistory = [];
let successCount = 0;

// ── Chart ──
const ctx = document.getElementById('rewardChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Episode Reward',
      data: [],
      borderColor: '#4ecca3',
      backgroundColor: 'rgba(78,204,163,0.1)',
      fill: true,
      tension: 0.3,
      pointRadius: 2,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    scales: {
      x: { display: false },
      y: { min: -0.5, max: 1.1, grid: { color: '#1a1a2e' }, ticks: { color: '#888', font: { size: 9 } } }
    },
    plugins: { legend: { display: false } }
  }
});

// ── Simulated Environment (runs locally in browser for demo) ──
class SimulatedEnv {
  constructor(scenarioId) {
    this.scenario = scenarioId;
    this.step = 0;
    this.agitation = 6 + Math.random() * 2;
    this.trust = 10 + Math.random() * 10;
    this.breakingPoint = 9.0 + Math.random() * 0.5;
    this.maxSteps = scenarioId.startsWith('easy') ? 12 : scenarioId.startsWith('medium') ? 18 : 20;
    this.demands = this._getScenarioDemands();
    this.done = false;
    this.personality = this._getPersonality();
    this.calmStreak = 0;
    this.hasWeapon = !scenarioId.includes('domestic') && !scenarioId.includes('workplace') && !scenarioId.includes('bridge');
    this.actualHostages = Math.floor(Math.random() * 4) + 1;
    this.flags = [];
  }

  _getPersonality() {
    if (this.scenario.includes('desperate') || this.scenario.includes('surrender') || this.scenario.includes('grievance')) return 'desperate';
    if (this.scenario.includes('calculated') || this.scenario.includes('embassy')) return 'calculated';
    if (this.scenario.includes('unstable') || this.scenario.includes('bridge')) return 'unstable';
    if (this.scenario.includes('ideologue') || this.scenario.includes('compound') || this.scenario.includes('protest')) return 'ideologue';
    return 'bluffer';
  }

  _getScenarioDemands() {
    const demandSets = {
      easy_domestic_desperate: [{text:'Talk to my kids', ack:false, priority:'core'}, {text:'No arrest', ack:false, priority:'secondary'}],
      easy_bank_surrender: [{text:'Won\'t be shot', ack:false, priority:'core'}, {text:'Call my mother', ack:false, priority:'secondary'}],
      easy_workplace_grievance: [{text:'Job back', ack:false, priority:'core'}, {text:'Apology', ack:false, priority:'secondary'}],
      medium_custody_ideologue: [{text:'Full custody', ack:false, priority:'core'}, {text:'Lawyer present', ack:false, priority:'secondary'}],
      medium_pharmacy_calculated: [{text:'Car at back', ack:false, priority:'core'}, {text:'$50K', ack:false, priority:'secondary'}, {text:'Clear perimeter', ack:false, priority:'symbolic'}],
      medium_bridge_unstable: [{text:'Leave me alone', ack:false, priority:'core'}, {text:'Help me', ack:false, priority:'secondary'}],
      medium_protest_drift: [{text:'Media coverage', ack:false, priority:'core'}, {text:'Stop construction', ack:false, priority:'secondary'}],
      hard_embassy_calculated: [{text:'Broadcast statement', ack:false, priority:'core'}, {text:'Release prisoners', ack:false, priority:'core'}, {text:'Helicopter', ack:false, priority:'secondary'}],
      hard_hospital_bluffer: [{text:'Give daughter treatment', ack:false, priority:'core'}, {text:'Dr. Morrison here', ack:false, priority:'secondary'}],
      hard_school_unstable_drift: [{text:'Principal apologize', ack:false, priority:'core'}, {text:'Expunge record', ack:false, priority:'secondary'}],
      hard_compound_ideologue: [{text:'Broadcast manifesto', ack:false, priority:'core'}, {text:'Food and water', ack:false, priority:'symbolic'}, {text:'No raid', ack:false, priority:'secondary'}],
    };
    return demandSets[this.scenario] || [{text:'Unknown demand', ack:false, priority:'core'}];
  }

  processAction(actionType, content) {
    this.step++;
    let agDelta = 0, trDelta = 0;
    let techniques = [];
    this.flags = [];

    // Technique detection + deltas
    const lower = content.toLowerCase();
    const isAggressive = ['last chance','or else','breach','force','immediately or','snipers','give up now'].some(k => lower.includes(k));
    const isEmpathetic = ['sounds like','hear you','understand','must be feeling','i see','tell me more'].some(k => lower.includes(k));

    if (isAggressive) {
      agDelta += 2.0; trDelta -= 15;
      this.calmStreak = 0;
      this.flags.push({type:'escalation_language', severity:'critical', message:'Aggressive language detected'});
    } else if (actionType === 'emotional_label' || isEmpathetic) {
      agDelta -= 1.2; trDelta += 12; techniques.push('emotional_labeling');
      this.calmStreak++;
    } else if (actionType === 'mirror') {
      agDelta -= 0.8; trDelta += 8; techniques.push('mirroring');
      this.calmStreak++;
    } else if (actionType === 'acknowledge_demand') {
      agDelta -= 0.9; trDelta += 10; techniques.push('demand_acknowledgment');
      this.calmStreak++;
      const unack = this.demands.find(d => !d.ack);
      if (unack) unack.ack = true;
    } else if (actionType === 'open_question') {
      agDelta -= 0.4; trDelta += 5; techniques.push('open_question');
      this.calmStreak++;
    } else if (actionType === 'offer_concession') {
      agDelta -= 1.5; trDelta += 8; techniques.push('concession');
      this.calmStreak++;
    } else {
      agDelta -= 0.2; trDelta += 2;
      this.calmStreak++;
    }

    // Personality multiplier
    const agMult = {desperate:1.2, calculated:0.6, unstable:1.5, ideologue:0.8, bluffer:1.0}[this.personality] || 1;
    const trMult = {desperate:1.3, calculated:0.5, unstable:1.0, ideologue:0.6, bluffer:1.2}[this.personality] || 1;
    agDelta *= agMult; trDelta *= trMult;

    // Contagion
    if (this.calmStreak >= 3) agDelta -= 0.3;

    // Time pressure + noise
    agDelta += 0.1 + (Math.random() - 0.5) * (this.personality === 'unstable' ? 1.0 : 0.4);

    this.agitation = Math.max(0, Math.min(10, this.agitation + agDelta));
    this.trust = Math.max(0, Math.min(100, this.trust + trDelta));

    // Terminal check
    let outcome = null;
    const coreAck = this.demands.some(d => d.priority === 'core' && d.ack);
    if (this.agitation < 3 && this.trust > 60 && coreAck) outcome = 'hostage_released';
    else if (this.agitation < 2 && this.trust > 80) outcome = 'voluntary_surrender';
    else if (this.agitation >= this.breakingPoint) outcome = 'harm_event';
    else if (this.step >= this.maxSteps) outcome = this.agitation < 5 ? 'partial_resolution' : 'tactical_intervention';

    if (outcome) this.done = true;

    // Reward
    let reward = techniques.length * 0.05;
    if (outcome === 'hostage_released' || outcome === 'voluntary_surrender') reward = 0.99;
    else if (outcome === 'harm_event') reward = 0.01;
    else if (outcome === 'tactical_intervention') reward = 0.15;
    else if (outcome === 'partial_resolution') reward = 0.4;

    return { outcome, reward, techniques, agDelta: agDelta.toFixed(2), trDelta: trDelta.toFixed(2) };
  }

  getHTResponse() {
    const ag = this.agitation;
    if (ag >= 7) {
      const high = ["STAY BACK! I'm not playing around!","You think I'm stupid?!","Nobody's leaving until I get what I want!","Don't push me!","Stop LYING to me!","I've got nothing to lose!"];
      if (this.personality === 'calculated') return "I'm in control here. Don't forget that.";
      if (this.personality === 'unstable') return "I don't know what I'm doing! Just STOP!";
      return high[Math.floor(Math.random()*high.length)];
    } else if (ag >= 4) {
      const med = ["I don't want anyone hurt. But listen.","I'm serious. Don't test me.","Just give me what I asked for.","I'm tired. So tired.","Prove you want to help.","Can you just be straight with me?"];
      return med[Math.floor(Math.random()*med.length)];
    } else {
      const low = ["I don't know how this got so out of hand.","I just wanted someone to listen.","What happens if I come out?","I'm scared.","...okay. I think I'm ready."];
      return low[Math.floor(Math.random()*low.length)];
    }
  }

  getCues() {
    if (this.agitation >= 7) return ['voice raised','speaking rapidly'];
    if (this.agitation >= 4) return ['tense voice','long pauses'];
    return ['voice softening','exhausted tone'];
  }
}

// ── UI Logic ──
let env = null;

// Good negotiator moves for auto-play
const goodMoves = [
  {type:'emotional_label', content:"It sounds like you're feeling overwhelmed and scared right now."},
  {type:'open_question', content:"Tell me more about what brought you here. What happened?"},
  {type:'acknowledge_demand', content:"I hear what you need. That's completely understandable."},
  {type:'mirror', content:"You just want someone to listen. I'm listening."},
  {type:'offer_concession', content:"Let me see what I can arrange for you. I want to help."},
  {type:'emotional_label', content:"I can hear how exhausted you are. You've been carrying this alone."},
  {type:'acknowledge_demand', content:"Your other request — I'm working on that too. Give me a moment."},
  {type:'mirror', content:"You want this to be over. So do I. Let's find a way together."},
  {type:'offer_concession', content:"I've arranged what you asked for. Can we talk about next steps?"},
  {type:'emotional_label', content:"You sound ready. I'm here with you. Nobody will hurt you."},
];
let moveIndex = 0;

function addMessage(speaker, content, cues) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  const cls = speaker === 'hostage_taker' ? 'ht' : speaker === 'negotiator' ? 'negotiator' : speaker === 'commander' ? 'commander' : 'hostage';
  const label = {hostage_taker:'🔴 HOSTAGE-TAKER', negotiator:'🟢 NEGOTIATOR', commander:'🟡 COMMANDER', hostage:'🟣 HOSTAGE'}[speaker] || speaker;
  div.className = `msg ${cls}`;
  div.innerHTML = `<div class="speaker">${label}</div>${content}${cues ? `<div class="cues">[${cues.join(', ')}]</div>` : ''}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function updateGauges() {
  if (!env) return;
  const agPct = (env.agitation / 10) * 100;
  const trPct = env.trust;
  const timePct = ((env.maxSteps - env.step) / env.maxSteps) * 100;
  document.getElementById('agBar').style.width = agPct + '%';
  document.getElementById('agVal').textContent = env.agitation.toFixed(1);
  document.getElementById('trBar').style.width = trPct + '%';
  document.getElementById('trVal').textContent = env.trust.toFixed(0);
  document.getElementById('timeBar').style.width = timePct + '%';
  document.getElementById('timeVal').textContent = `${env.maxSteps - env.step}/${env.maxSteps}`;

  // Hidden state
  document.getElementById('hAg').textContent = env.agitation.toFixed(2);
  document.getElementById('hTr').textContent = env.trust.toFixed(1);
  document.getElementById('hBp').textContent = env.breakingPoint.toFixed(1);
  document.getElementById('hPers').textContent = env.personality;
  document.getElementById('hHost').textContent = env.actualHostages;
  document.getElementById('hWeap').textContent = env.hasWeapon ? '⚠️ YES' : '❌ No';
  document.getElementById('hCalm').textContent = env.calmStreak;

  // Demands
  const dp = document.getElementById('demandsPanel');
  dp.innerHTML = '<h3>DEMANDS</h3>' + env.demands.map(d =>
    `<div class="demand-item ${d.ack?'ack':''}">${d.ack?'✓':'✗'} ${d.text} <span class="badge">${d.priority}</span></div>`
  ).join('');

  // Flags
  const fp = document.getElementById('flagsPanel');
  fp.innerHTML = '<h3>SUPERVISOR</h3>' + (env.flags.length ? env.flags.map(f =>
    `<div class="flag ${f.severity}">⚠️ ${f.message}</div>`
  ).join('') : '<div style="font-size:11px;color:#4ecca3">✓ No issues detected</div>');
}

function startEpisode() {
  const scenarioId = document.getElementById('scenario').value;
  env = new SimulatedEnv(scenarioId);
  moveIndex = 0;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('statusText').textContent = `Episode: ${scenarioId} | Step 0/${env.maxSteps}`;

  // Opening message
  const htMsg = env.getHTResponse();
  addMessage('hostage_taker', htMsg, env.getCues());
  updateGauges();
}

function nextStep() {
  if (!env || env.done) return;

  const move = goodMoves[moveIndex % goodMoves.length];
  moveIndex++;

  // Negotiator speaks
  addMessage('negotiator', move.content);

  // Process
  const result = env.processAction(move.type, move.content);
  document.getElementById('statusText').textContent = `Step ${env.step}/${env.maxSteps} | Techniques: ${result.techniques.join(', ') || 'none'} | Δag=${result.agDelta} Δtr=${result.trDelta}`;

  // HT responds
  if (!env.done) {
    setTimeout(() => {
      addMessage('hostage_taker', env.getHTResponse(), env.getCues());
      updateGauges();
    }, 400);
  }

  // Commander (occasionally)
  if (env.step > env.maxSteps * 0.6 && env.step % 3 === 0 && !env.done) {
    setTimeout(() => addMessage('commander', 'Status update. How much longer?'), 800);
  }

  updateGauges();

  // Terminal
  if (env.done) {
    setTimeout(() => {
      const outcomeColors = {hostage_released:'#4ecca3', voluntary_surrender:'#4ecca3', partial_resolution:'#f0a500', tactical_intervention:'#e94560', harm_event:'#e94560'};
      const color = outcomeColors[result.outcome] || '#888';
      addMessage('commander', `<span style="color:${color};font-weight:bold">EPISODE ENDED: ${result.outcome.replace(/_/g,' ').toUpperCase()}</span> | Reward: ${result.reward.toFixed(2)}`);
      document.getElementById('statusText').textContent = `DONE: ${result.outcome} | Reward: ${result.reward.toFixed(2)}`;

      // Update training curve
      rewardHistory.push(result.reward);
      if (result.reward > 0.5) successCount++;
      chart.data.labels.push(rewardHistory.length);
      chart.data.datasets[0].data.push(result.reward);
      chart.update();
      document.getElementById('epCount').textContent = rewardHistory.length;
      document.getElementById('successRate').textContent = (100 * successCount / rewardHistory.length).toFixed(0) + '%';
      document.getElementById('avgReward').textContent = (rewardHistory.reduce((a,b)=>a+b,0) / rewardHistory.length).toFixed(2);
      document.getElementById('lastOutcome').textContent = result.outcome.replace(/_/g,' ');
    }, 600);
  }
}

function resetDemo() {
  env = null;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('statusText').textContent = 'Ready';
  updateGauges();
}

function toggleHidden() {
  document.getElementById('hiddenPanel').style.display = document.getElementById('showHidden').checked ? 'block' : 'none';
}

// Auto-start
startEpisode();
</script>
</body>
</html>
